<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CBSE Result Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <h2>CBSE Result Portal</h2>
  </nav>

  <section class="one">
    <h1>Check Your Result Easily</h1>
  </section>

  <div class="steps">
    <span id="step1" class="active">1. Choose Class</span>
    <span id="step2">2. Enter Details</span>
    <span id="step3">3. View Result</span>
  </div>

  <section class="options">
    <button onclick="selectClass('10')">Class 10</button>
    <button onclick="selectClass('12')">Class 12</button>
  </section>

  <section class="form-section" id="formSection">
  <h2>Enter Details</h2>

  <label>Roll Number</label>
  <input type="text" id="roll">
  <small class="error" id="rollError"></small>

  <label>School Number</label>
  <input type="text" id="school">
  <small class="error" id="schoolError"></small>

  <label>Admit Card ID</label>
  <input type="text" id="admit">
  <small class="error" id="admitError"></small>

  <label>Date of Birth</label>
  <input type="date" id="dob">
  <small class="error" id="dobError"></small>

  <div class="captcha-box">
    <span id="captchaText"></span>
    <button onclick="generateCaptcha()">↻</button>
  </div>

  <input type="text" id="captchaInput" placeholder="Enter Security Pin">
  <small class="error" id="captchaError"></small>

  <button onclick="showResult()">Check Result</button>
</section>

  <div class="loading" id="loading">Fetching your result...</div>

  <section class="result" id="result">
    <h2>Your Result</h2>

    <div class="card">
      <p><strong>Name:</strong> Rahul Sharma</p>
      <p>Maths: 90</p>
      <p>Science: 88</p>
      <p>English: 92</p>
      <p>Social Science: 85</p>
      <p><strong>Total:</strong> 455 / 500</p>
      <p class="pass">PASS ✅</p>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
